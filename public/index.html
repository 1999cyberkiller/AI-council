<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAGI SYSTEM</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="masthead">
        <div>
          <p class="eyebrow">Market Analysis Grid Intelligence</p>
          <h1>MAGI SYSTEM</h1>
          <p class="masthead-brief">把一个问题交给四个独立模型。四个模型并行判断，MAGI SYSTEM 只保留共识、分歧和少数派信号。</p>
        </div>
        <div class="live-pill" id="status">连接中</div>
      </header>

      <section class="brief-board prompt-board" aria-label="分析输入">
        <form class="prompt-form" id="briefForm">
          <label class="sr-only" for="question">问题</label>
          <div class="prompt-box">
            <textarea id="question" spellcheck="true" rows="3" placeholder="输入问题、标的、时间窗口、仓位和风险约束"></textarea>
            <button class="send-button" id="runButton" type="submit" aria-label="启动 MAGI">
              <span aria-hidden="true">↑</span>
            </button>
          </div>
        </form>
      </section>

      <section class="decision-board" id="decisionPanel">
        <div class="empty-state">
          <p class="section-kicker">Decision Memo</p>
          <h2>等待 MAGI 分析</h2>
          <p>结果会压缩成一份可执行备忘录。先看方向，再看分歧，最后看证据。</p>
        </div>
      </section>

      <section class="council-board">
        <div class="section-title">
          <p class="section-kicker">Council</p>
          <h2>AI 分析</h2>
        </div>
        <div class="member-grid" id="members"></div>
      </section>

      <section class="evidence-board">
        <div class="section-title">
          <p class="section-kicker">Evidence</p>
          <h2>辅助工具</h2>
        </div>
        <div class="evidence-grid" id="toolEvidence"></div>
      </section>

      <details class="system-details">
        <summary>系统配置</summary>
        <div class="system-grid">
          <section>
            <h3>模型</h3>
            <div id="councilList"></div>
          </section>
          <section>
            <h3>资源</h3>
            <div id="toolList"></div>
          </section>
        </div>
      </details>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
