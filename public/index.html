<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAGI SYSTEM</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="masthead">
        <div>
          <p class="eyebrow">Market Analysis Grid Intelligence</p>
          <h1>MAGI SYSTEM</h1>
        </div>
        <div class="live-pill" id="status">连接中</div>
      </header>

      <section class="brief-board" aria-label="分析输入">
        <div class="brief-copy">
          <p class="section-kicker">Brief</p>
          <h2>把一个金融问题交给四个独立模型。</h2>
          <p>四个模型并行判断，系统只保留共识、分歧和少数派信号。</p>
        </div>
        <form class="brief-form" id="briefForm">
          <label for="question">问题</label>
          <textarea id="question" spellcheck="true">未来 6 个月是否应该提高 AI 半导体股票的配置比例？</textarea>

          <label for="context">约束</label>
          <textarea id="context" spellcheck="true" class="small">风险承受能力：中等。更重视回撤控制，希望每个结论都给出会改变判断的触发条件。</textarea>

          <div class="actions-row">
            <button id="runButton" type="submit">启动 MAGI</button>
            <button id="sampleButton" type="button" class="secondary">示例</button>
          </div>
        </form>
      </section>

      <section class="decision-board" id="decisionPanel">
        <div class="empty-state">
          <p class="section-kicker">Decision Memo</p>
          <h2>等待 MAGI 分析</h2>
          <p>结果会压缩成一份可执行备忘录。先看方向，再看分歧，最后看证据。</p>
        </div>
      </section>

      <section class="signal-strip" aria-label="MAGI 状态">
        <div class="signal-card">
          <span>模型</span>
          <strong id="memberCount">0</strong>
        </div>
        <div class="signal-card">
          <span>在线</span>
          <strong id="liveModelCount">0</strong>
        </div>
        <div class="signal-card">
          <span>证据源</span>
          <strong id="toolEvidenceCount">0</strong>
        </div>
      </section>

      <section class="council-board">
        <div class="section-title">
          <p class="section-kicker">Council</p>
          <h2>四模型摘要</h2>
        </div>
        <div class="member-grid" id="members"></div>
      </section>

      <section class="evidence-board">
        <div class="section-title">
          <p class="section-kicker">Evidence</p>
          <h2>证据快照</h2>
        </div>
        <div class="evidence-grid" id="toolEvidence"></div>
      </section>

      <details class="system-details">
        <summary>系统配置</summary>
        <div class="system-grid">
          <div id="councilList"></div>
          <div id="toolList"></div>
        </div>
      </details>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
