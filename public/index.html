<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAGI SYSTEM</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="masthead">
        <div>
          <p class="eyebrow">Market Analysis Grid Intelligence</p>
          <h1>MAGI SYSTEM</h1>
        </div>
        <div class="live-pill" id="status">连接中</div>
      </header>

      <section class="brief-board" aria-label="分析输入">
        <div class="brief-copy">
          <p class="section-kicker">Brief</p>
          <h2>把一个金融问题交给四个独立模型。</h2>
          <p>四个模型并行判断，系统只保留共识、分歧和少数派信号。</p>
        </div>
        <form class="brief-form" id="briefForm">
          <label for="question">问题</label>
          <textarea id="question" spellcheck="true" placeholder="输入需要判断的标的、时间窗口与决策问题"></textarea>

          <label for="context">约束</label>
          <textarea id="context" spellcheck="true" class="small" placeholder="输入仓位、风险偏好、已有持仓、不可接受的风险"></textarea>

          <div class="actions-row">
            <button id="runButton" type="submit">启动 MAGI</button>
          </div>
        </form>
      </section>

      <section class="decision-board" id="decisionPanel">
        <div class="empty-state">
          <p class="section-kicker">Decision Memo</p>
          <h2>等待 MAGI 分析</h2>
          <p>结果会压缩成一份可执行备忘录。先看方向，再看分歧，最后看证据。</p>
        </div>
      </section>

      <section class="council-board">
        <div class="section-title">
          <p class="section-kicker">Council</p>
          <h2>四模型摘要</h2>
        </div>
        <div class="member-grid" id="members"></div>
      </section>

      <section class="evidence-board">
        <div class="section-title">
          <p class="section-kicker">Evidence</p>
          <h2>证据快照</h2>
        </div>
        <div class="evidence-grid" id="toolEvidence"></div>
      </section>

      <details class="system-details">
        <summary>系统配置</summary>
        <div class="system-grid">
          <section>
            <h3>模型</h3>
            <div id="councilList"></div>
          </section>
          <section>
            <h3>资源</h3>
            <div id="toolList"></div>
          </section>
        </div>
      </details>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
