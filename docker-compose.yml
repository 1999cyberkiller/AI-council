services:
  ai-finance-council:
    build: .
    container_name: ai-finance-council
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:4177:4177"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4177/health"]
      interval: 30s
      timeout: 5s
      retries: 3
